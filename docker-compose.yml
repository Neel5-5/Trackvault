version: "3.9"

services:
  pockettrack:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - pockettrack_data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/events.db
      # Optional: set a token to protect the dashboard
      # - DASHBOARD_TOKEN=changeme
    restart: unless-stopped

volumes:
  pockettrack_data:
